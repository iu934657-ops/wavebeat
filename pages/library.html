    <div class="logo">
        <i class="fa-solid fa-wave-square"></i> WaveBeat

<!-- LIBRARY -->
<section style="padding:120px 8%;">

<h2>Music Library</h2>

<!-- SEARCH BAR (FIXED) -->
<input type="text" id="searchInput" class="search-box" placeholder="Search songs...">

<div class="library-grid">

    <div class="song-card">
        <img src="https://picsum.photos/500?random=1">
        <h3>Night Drive</h3>
        <p>Synthwave</p>
        <button class="play-song">Play</button>
    </div>

    <div class="song-card">
        <img src="https://picsum.photos/500?random=2">
        <h3>Cyber Dreams</h3>
        <p>Electronic</p>
        <button class="play-song">Play</button>
    </div>

    <div class="song-card">
        <img src="https://picsum.photos/500?random=3">
        <h3>Ocean Lights</h3>
        <p>Chill</p>
        <button class="play-song">Play</button>
    </div>

    <div class="song-card">
        <img src="https://picsum.photos/500?random=4">
        <h3>Electric Pulse</h3>
        <p>Dance</p>
        <button class="play-song">Play</button>
    </div>

    <div class="song-card">
        <img src="https://picsum.photos/500?random=5">
        <h3>Midnight Echo</h3>
        <p>Lo-Fi</p>
        <button class="play-song">Play</button>
    </div>

    <div class="song-card">
        <img src="https://picsum.photos/500?random=6">
        <h3>Skyline Beats</h3>
        <p>Future Bass</p>

</div>
